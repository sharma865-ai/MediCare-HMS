{% extends "layout/dashboard_base.html" %}

{% block title %}Add Department{% endblock %}

{% block page_title %}Add Department{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h4>Add Department</h4>

</div>

<div class="card-body">

<form method="POST">

<input type="hidden"
name="id"
value="{{ department.id if department else '' }}">

<div class="mb-3">

<label>Department Name</label>

<input
type="text"
name="name"
class="form-control"
value="{{ department.name if department else '' }}"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
class="form-control"
rows="4">{{ department.description if department else '' }}</textarea>

</div>

<button class="btn btn-primary">

{{ "Update Department" if department else "Save Department" }}

</button>

<a href="/admin/departments"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
