{% extends "layout/dashboard_base.html" %}

{% block title %}
Add Doctor
{% endblock %}

{% block page_title %}
Add New Doctor
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h4 class="mb-0">
                    Add Doctor
                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <input type="hidden"
                    name="id"
                    value="{{ doctor.id if doctor else '' }}">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
    type="text"
    name="full_name"
    class="form-control"
    value="{{ doctor.full_name if doctor else '' }}"
    required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Specialization
                            </label>

                            <input
    type="text"
    name="specialization"
    class="form-control"
    value="{{ doctor.specialization if doctor else '' }}"
    required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>Email</label>

                           <input
    type="email"
    name="email"
    class="form-control"
    value="{{ doctor.email if doctor else '' }}">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Phone</label>

                           <input
    type="text"
    name="phone"
    class="form-control"
    value="{{ doctor.phone if doctor else '' }}">

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>Qualification</label>

                           <input
    type="text"
    name="qualification"
    class="form-control"
    value="{{ doctor.qualification if doctor else '' }}">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Experience (Years)</label>

                           <input
    type="number"
    name="experience"
    class="form-control"
    value="{{ doctor.experience if doctor else '' }}">

                        </div>

                    </div>

                    <div class="mb-3">

                        <label>Consultation Fee</label>

                        <input
    type="number"
    step="0.01"
    name="consultation_fee"
    class="form-control"
    value="{{ doctor.consultation_fee if doctor else '' }}">

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        {{ "Update Doctor" if doctor else "Save Doctor" }}

                    </button>

                    <a href="/admin/doctors"
                       class="btn btn-secondary">

                        Back

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
