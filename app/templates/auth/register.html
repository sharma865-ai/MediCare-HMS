{% extends "base.html" %}

{% block title %}Register | MediCare HMS{% endblock %}

{% block content %}

<section class="hero d-flex align-items-center">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-lg border-0 rounded-4 p-5">

<div class="text-center mb-4">

<img src="{{ url_for('static', filename='images/logo.png') }}" width="80">

<h2 class="mt-3 text-primary">Create Account</h2>

<p class="text-muted">
Join MediCare HMS
</p>

</div>

<form method="POST">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input
type="text"
class="form-control"
name="full_name"
placeholder="Enter Full Name"
required>
</div>

<div class="mb-3">
<label>Email</label>
<input
type="email"
class="form-control"
name="email"
placeholder="Enter Email"
required>
</div>

<div class="mb-3">
<label>Phone</label>
<input
type="text"
class="form-control"
name="phone"
placeholder="Enter Mobile Number">
</div>

<div class="mb-3">
<label>Password</label>
<input
type="password"
class="form-control"
name="password"
placeholder="Create Password"
required>
</div>

<div class="mb-4">
<label>Role</label>

<select
class="form-select"
name="role">

<option value="patient">
Patient
</option>

<option value="doctor">
Doctor
</option>

<option value="receptionist">
Receptionist
</option>

</select>

</div>

<button
class="btn btn-primary w-100">

Create Account

</button>

</form>

<div class="text-center mt-4">

Already have an account?

<a href="/login">
Login
</a>

</div>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
