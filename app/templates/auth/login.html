{% extends "base.html" %}

{% block title %}Login | MediCare HMS{% endblock %}

{% block content %}

<section class="hero">

    <div class="container">

        <div class="row justify-content-center align-items-center">

            <div class="col-lg-5">

                <div class="card shadow-lg border-0 rounded-4 p-4">

                    <div class="text-center mb-4">

                        <img src="{{ url_for('static', filename='images/logo.png') }}"
                             width="80">

                        <h2 class="mt-3 text-primary">
                            Welcome Back
                        </h2>

                        <p class="text-muted">
                            Login to MediCare HMS
                        </p>

                    </div>

                    <form>

                        <div class="mb-3">

                            <label>Email Address</label>

                            <input
                                type="email"
                                class="form-control"
                                placeholder="Enter Email">

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input
                                type="password"
                                class="form-control"
                                placeholder="Enter Password">

                        </div>

                        <button
                            class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                    <hr>

                    <p class="text-center">

                        Don't have an account?

                        <a href="/register">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
