<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}Dashboard{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<div class="d-flex">

    <!-- Sidebar -->

    <div class="bg-primary text-white p-3 vh-100" style="width:260px;">

        <h3 class="mb-4">
            MediCare HMS
        </h3>

        <a href="/admin/dashboard" class="d-block text-white text-decoration-none mb-3">
    <i class="bi bi-speedometer2"></i> Dashboard
</a>

<a href="/admin/doctors" class="d-block text-white text-decoration-none mb-3">
    <i class="bi bi-person-vcard"></i> Doctors
</a>

<a href="/admin/departments" class="d-block text-white text-decoration-none mb-3">
    <i class="bi bi-building"></i> Departments
</a>

<a href="/admin/appointments" class="d-block text-white text-decoration-none mb-3">
    <i class="bi bi-calendar-check"></i> Appointments
</a>

<a href="/admin/patients" class="d-block text-white text-decoration-none mb-3">
    <i class="bi bi-people"></i> Patients
</a>

        <hr>

        <a href="/logout" class="btn btn-light w-100">
            Logout
        </a>

    </div>

    <!-- Main -->

    <div class="flex-grow-1">

        <!-- Navbar -->

        <nav class="navbar navbar-light bg-white shadow-sm">

            <div class="container-fluid">

                <h4 class="mb-0">
                    {% block page_title %}
                    Dashboard
                    {% endblock %}
                </h4>

                <span>

                    Welcome,
                    <strong>{{ current_user.full_name }}</strong>

                </span>

            </div>

        </nav>

        <div class="container-fluid mt-4">

            {% block content %}

            {% endblock %}

        </div>

    </div>

</div>

</body>

</html>
